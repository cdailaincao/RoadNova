{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RoadNova{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="{% static 'trips/styles.css' %}">
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="https://unpkg.com/lucide@latest"></script>
  <script defer src="{% static 'trips/app.js' %}"></script>
</head>
<body>
  <header class="topbar">
    <!-- ── Left: hamburger + logo ── -->
    <div class="topbar-left">
      <button class="hamburger" id="menu-toggle" aria-label="Toggle menu" type="button">
        <span></span><span></span><span></span>
      </button>
      <a class="brand" href="{% url 'home' %}" aria-label="RoadNova home">
        <div class="brand-mark">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 17l4-8 4 4 4-6 4 10"/><circle cx="19" cy="17" r="2"/><circle cx="5" cy="17" r="2"/></svg>
        </div>
        <span class="brand-name">Road<em>Nova</em></span>
      </a>
    </div>

    <!-- ── Right: SOS only ── -->
    <button class="sos-emergency-btn" data-view="sos" type="button" aria-label="Emergency SOS">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14z"/></svg>
      <span>SOS</span>
      <span class="sos-pulse"></span>
    </button>
  </header>

  <!-- ── Slide-out nav drawer ── -->
  <div class="nav-drawer-backdrop" id="nav-backdrop"></div>
  <nav class="nav-drawer" id="nav-drawer" aria-label="Main navigation">
    <div class="nav-drawer-header">
      <span class="brand-name">Road<em>Nova</em></span>
      <button class="nav-drawer-close" id="drawer-close" aria-label="Close menu" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="nav-drawer-links">
      <button class="nav-drawer-item" data-view="home" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </button>
      <button class="nav-drawer-item" data-view="planner" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M13 5l7 7-7 7"/></svg>
        Trip Planner
      </button>
      <button class="nav-drawer-item" data-view="map" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
        Map
      </button>
      <button class="nav-drawer-item" data-view="rentals" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        Rent a Vehicle
      </button>
      <button class="nav-drawer-item" data-view="costs" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        Budget
      </button>
      <button class="nav-drawer-item" data-view="weather" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.5 19H9a7 7 0 117-7c0 2.21-.9 4.21-2.35 5.65"/><path d="M22 15h-4M12 3V1M4.22 4.22L5.64 5.64M1 12H3M4.22 19.78l1.42-1.42"/></svg>
        Weather
      </button>
      <button class="nav-drawer-item" data-view="split" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        Group Split
      </button>
      <div class="nav-drawer-divider"></div>
      <button class="nav-drawer-item nav-drawer-sos" data-view="sos" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14z"/></svg>
        SOS &amp; Emergency
      </button>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="brand-name">Road<em>Nova</em></span>
        <p>India's road trip studio — plan smarter, drive freer.</p>
      </div>
      <div class="footer-links">
        <span>Powered by OpenStreetMap · Open-Meteo · OSRM</span>
      </div>
    </div>
  </footer>
  <script>
    (function() {
      var toggle   = document.getElementById('menu-toggle');
      var drawer   = document.getElementById('nav-drawer');
      var backdrop = document.getElementById('nav-backdrop');
      var closeBtn = document.getElementById('drawer-close');

      function openDrawer() {
        drawer.classList.add('open');
        backdrop.classList.add('open');
        document.body.style.overflow = 'hidden';
      }
      function closeDrawer() {
        drawer.classList.remove('open');
        backdrop.classList.remove('open');
        document.body.style.overflow = '';
      }

      toggle.addEventListener('click', openDrawer);
      closeBtn.addEventListener('click', closeDrawer);
      backdrop.addEventListener('click', closeDrawer);

      drawer.querySelectorAll('[data-view]').forEach(function(btn) {
        btn.addEventListener('click', closeDrawer);
      });
    })();
  </script>
</body>
</html>
